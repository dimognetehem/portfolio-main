<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><rect width="800" height="400" fill="#f8fafc"/><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path fill="none" stroke="#e2e8f0" stroke-width=".5" d="M 40 0 L 0 40 M 0 0 L 40 40"/></pattern><rect width="800" height="400" fill="url(#grid)" opacity=".2"/><text x="400" y="50" fill="#1e293b" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Beyond Traditional File Uploads</text><text x="400" y="80" fill="#3b82f6" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Scaling with Presigned URLs</text><rect width="120" height="60" x="50" y="120" fill="#e2e8f0" rx="5"/><text x="110" y="155" fill="#1e293b" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Client</text><text x="110" y="170" fill="#64748b" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">1. Request Upload URL</text><rect width="120" height="60" x="250" y="120" fill="#3b82f6" rx="5"/><text x="310" y="155" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">App Server</text><text x="310" y="170" fill="#fff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">2. Generate URL</text><rect width="120" height="60" x="450" y="120" fill="#fb923c" rx="5"/><text x="510" y="155" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">AWS S3</text><text x="510" y="170" fill="#fff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">3. Sign URL</text><rect width="120" height="60" x="650" y="120" fill="#10b981" rx="5"/><text x="710" y="155" fill="#fff" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">S3 Bucket</text><text x="710" y="170" fill="#fff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">4. Store File</text><defs><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#64748b" points="0 0 10 3.5 0 7"/></marker></defs><path stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" d="M170 150 L250 150"/><path stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" d="M370 150 L450 150"/><path stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" d="M450 180 L370 180"/><path stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" d="M250 180 L170 180"/><path fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)" d="M110 200 L710 200"/><rect width="200" height="100" x="50" y="250" fill="#1e293b" opacity=".9" rx="5"/><foreignObject width="180" height="80" x="60" y="260"><div xmlns="http://www.w3.org/1999/xhtml" style="color:#e2e8f0;font-family:monospace;font-size:10px;white-space:pre-wrap">// 1. Request URL fetch(&apos;/request-upload&apos;, { method: &apos;POST&apos;, body: JSON.stringify({ filename: &apos;example.pdf&apos; }) });</div></foreignObject><rect width="200" height="100" x="300" y="250" fill="#1e293b" opacity=".9" rx="5"/><foreignObject width="180" height="80" x="310" y="260"><div xmlns="http://www.w3.org/1999/xhtml" style="color:#e2e8f0;font-family:monospace;font-size:10px;white-space:pre-wrap">// 2. Generate Presigned URL s3.generatePresignedUrl({ Bucket: &apos;my-bucket&apos;, Key: file_key, Expires: 3600 });</div></foreignObject><rect width="200" height="100" x="550" y="250" fill="#1e293b" opacity=".9" rx="5"/><foreignObject width="180" height="80" x="560" y="260"><div xmlns="http://www.w3.org/1999/xhtml" style="color:#e2e8f0;font-family:monospace;font-size:10px;white-space:pre-wrap">// 3. Upload File fetch(presignedUrl, { method: &apos;PUT&apos;, body: file });</div></foreignObject><text x="410" y="220" fill="#10b981" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Direct File Upload</text><circle y="320" cx="750" r="20" fill="#10b981"/><path fill="none" stroke="#fff" stroke-width="3" d="M740 320 L750 330 L760 310"/></svg>